<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — SafeAlert</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; flex-direction: column; }
    .top-bar { padding: 16px 32px; }
    .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .logo-icon { width: 34px; height: 34px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .logo-text { color: white; font-size: 18px; font-weight: 700; }
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: white; border-radius: 20px; padding: 40px 36px; width: 420px; box-shadow: 0 24px 64px rgba(0,0,0,0.2); }
    h2 { font-size: 24px; font-weight: 700; color: #2d3748; margin-bottom: 6px; }
    .subtitle { color: #a0aec0; font-size: 14px; margin-bottom: 28px; }
    label { display: block; font-size: 13px; color: #4a5568; margin-bottom: 5px; font-weight: 500; }
    input { width: 100%; padding: 11px 14px; margin-bottom: 18px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; transition: border 0.2s; }
    input:focus { border-color: #667eea; }
    .btn { width: 100%; padding: 13px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; }
    .status { text-align: center; margin-top: 12px; font-size: 13px; padding: 8px; border-radius: 6px; min-height: 18px; }
    .status.error { background: #fff5f5; color: #c53030; }
    .status.success { background: #f0fff4; color: #276749; }
    .bottom-link { text-align: center; margin-top: 20px; font-size: 13px; color: #718096; }
    .bottom-link a { color: #667eea; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
<div class="top-bar">
  <a class="logo" href="/">
    <div class="logo-icon">🛡️</div>
    <div class="logo-text">SafeAlert</div>
  </a>
</div>
<div class="main">
  <div class="card">
    <h2>Welcome back</h2>
    <p class="subtitle">Login to access your safety dashboard</p>

    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@example.com"/>

    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••"/>

    <button class="btn" id="submit-btn" onclick="login()">Login</button>
    <p class="status" id="status"></p>

    <div class="bottom-link">
      Don't have an account? <a href="/register">Register here</a>
    </div>
  </div>
</div>

<script>
  if (localStorage.getItem('token')) window.location.href = '/sos';

  async function login() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const statusEl = document.getElementById('status');
    const btn      = document.getElementById('submit-btn');

    if (!email || !password) {
      statusEl.textContent = 'Please enter email and password.';
      statusEl.className = 'status error'; return;
    }

    btn.textContent = 'Logging in...';
    btn.disabled = true;

    try {
      const res  = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        statusEl.textContent = '✅ Login successful! Redirecting...';
        statusEl.className = 'status success';
        setTimeout(() => {
          window.location.href = data.user.role === 'admin' ? '/dashboard' : '/sos';
        }, 1000);
      } else {
        statusEl.textContent = data.msg || 'Login failed.';
        statusEl.className = 'status error';
        btn.textContent = 'Login';
        btn.disabled = false;
      }
    } catch (err) {
      statusEl.textContent = 'Cannot connect to server.';
      statusEl.className = 'status error';
      btn.textContent = 'Login';
      btn.disabled = false;
    }
  }

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
